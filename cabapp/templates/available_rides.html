<!DOCTYPE html>
<html>
<head>
    <title>Available Rides</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            padding:20px;
        }

        h2{
            text-align:center;
        }

        table{
            width:80%;
            margin:auto;
            border-collapse:collapse;
        }

        th, td{
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

        th{
            background:#28a745;
            color:white;
        }

        .btn{
            text-decoration:none;
            background:#007bff;
            color:white;
            padding:6px 12px;
            border-radius:5px;
        }
    </style>
</head>
<body>

<h2>🚖 Available Rides</h2>

<table>
    <tr>
        <th>Ride ID</th>
        <th>Pickup</th>
        <th>Drop</th>
        <th>Fare</th>
    </tr>

    {% for ride in rides %}
    <tr>
        <td>{{ ride.id }}</td>
        <td>{{ ride.pickup_location }}</td>
        <td>{{ ride.drop_location }}</td>
        <td>{{ ride.fare }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
